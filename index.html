<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coin Flip Pro</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="bg"></div>

  <div class="app">

    <header>
      <h1>COIN FLIP <span>PRO</span></h1>
      <p>Simulatore 3D testa o croce</p>
    </header>

    <section class="panel">

      <div class="settings">
        <label>Modalità</label>
        <select id="mode">
          <option value="3">Best of 3</option>
          <option value="5">Best of 5</option>
          <option value="custom">Custom</option>
        </select>

        <input id="customRounds" type="number" placeholder="Numero round (custom)" />
        
        <label>Stake (€)</label>
        <input id="stake" type="number" placeholder="Inserisci valore..." />
      </div>

      <div class="scoreboard">
        <div>Tu: <span id="userScore">0</span></div>
        <div>CPU: <span id="cpuScore">0</span></div>
      </div>

      <div class="coin-container">
        <div id="coin" class="coin">
          <div class="face heads">HEADS</div>
          <div class="face tails">TAILS</div>
        </div>
      </div>

      <div class="buttons">
        <button onclick="play('heads')">Testa</button>
        <button onclick="play('tails')">Croce</button>
      </div>

      <p id="result"></p>

    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
